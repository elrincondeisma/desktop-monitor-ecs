name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Construir sin publicar: la publicación con electron-builder crea
      # releases draft duplicadas cuando dmg y zip suben en paralelo.
      - name: Construir (sin firma)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publicar en GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "dist/ECSMonitor-${VERSION}-universal.dmg" \
            "dist/ECSMonitor-${VERSION}-universal.zip" \
            "dist/ECSMonitor-${VERSION}-universal.dmg.blockmap" \
            "dist/ECSMonitor-${VERSION}-universal.zip.blockmap" \
            "dist/latest-mac.yml"

      # Avisa al tap de Homebrew para que actualice el cask con la nueva
      # versión y sha256. Requiere el secret TAP_TOKEN (PAT con permiso de
      # escritura en elrincondeisma/homebrew-tap); si falta, se omite.
      - name: Actualizar cask en homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN no configurado; omito la actualización del cask"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "dist/ECSMonitor-${VERSION}-universal.zip" | cut -d' ' -f1)
          curl -sf -X POST \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/elrincondeisma/homebrew-tap/dispatches \
            -d "{\"event_type\":\"update-ecs-monitor-cask\",\"client_payload\":{\"version\":\"$VERSION\",\"sha256_universal\":\"$SHA256\"}}"
